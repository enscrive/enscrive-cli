# Enscrive CLI Surface Contract
#
# This file maps every /v1 API endpoint to its CLI command.
# When adding a new /v1 endpoint to enscrive-developer, you MUST add an entry here.
# When implementing a CLI command, update the status from "missing" to "implemented".
#
# A CI check (tests/surface_contract.rs) verifies that:
# 1. Every endpoint listed here has status = "implemented" or an explicit "deferred" with a reason
# 2. No "missing" entries exist without a tracking issue
#
# Status values:
#   "implemented" — CLI command exists and works
#   "missing"     — no CLI command yet (fails CI)
#   "deferred"    — intentionally not implemented yet, requires reason field

# ── Search ──────────────────────────────────────────────

[[endpoint]]
method = "POST"
path = "/v1/search"
cli_command = "search"
status = "implemented"
deployment_tier = "any-mode"
required_plan = "free"

[[endpoint]]
method = "POST"
path = "/v1/query-embeddings"
cli_command = "embeddings query"
status = "implemented"
deployment_tier = "any-mode"
required_plan = "free"

