name: manifest

# ENS-91 / RB-005 — Manifest generator + publication workflow.
# Operator-dispatched: must only run after all per-repo release workflows
# have completed for the given version tag. No push trigger by design.
#
# Distribution patterns:
#   Pattern A ("ride the herd"): binary tag == unified Enscrive platform version.
#     Applies to: enscrive-cli, enscrive-developer, enscrive-observe,
#                 enscrive-embed, esm, enscrive-metering-sentinel.
#   Pattern B ("pinned per-binary"): binary owns its own semver cadence;
#     the manifest pins which version to bundle. Applies to enscrive-docs.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Unified Enscrive release version tag (e.g. v0.1.0-beta.3)"
        required: true
        type: string
      enscrive_docs_version:
        description: "enscrive-docs version tag to bundle (leave empty to resolve the latest tag automatically)"
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  AWS_ROLE_ARN: arn:aws:iam::535002853127:role/enscrive-releases-publisher
  S3_BUCKET: enscrive-install-artifacts-dev
  CF_DISTRIBUTION_ID: EWE9BH1POOS0A
  CHANNEL: dev

jobs:
  generate-manifest:
    name: generate and publish manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout enscrive-cli at version tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      # ---------------------------------------------------------------------------
      # ENS-507: enscrive-deploy is the source of truth for channel topology
      # (PRD §0.3 / §5.8). Roster.toml + channels/<channel>.toml replace the
      # four bash associative arrays (SOURCE_VERSIONS, BINARIES, ARTIFACT_KIND,
      # PLATFORMS) that were duplicated across the three downstream steps.
      # Pinned at main for now — promotion-ceremony PRs are the gating mechanism.
      # ---------------------------------------------------------------------------
      - name: Checkout enscrive-deploy (channel source of truth)
        uses: actions/checkout@v4
        with:
          repository: enscrive/enscrive-deploy
          ref: main
          path: _deploy
          # ENS-538: PAT with `Contents: read` on enscrive-deploy. Default GITHUB_TOKEN
          # cannot read this private cross-repo. Workflow falls back to GITHUB_TOKEN
          # if secret is absent (which will 403, matching today's behavior — surfaces
          # the missing-secret state loudly rather than silently).
          token: ${{ secrets.ENSCRIVE_ORCHESTRATOR_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ---------------------------------------------------------------------------
      # Resolve the concrete enscrive-docs version tag.
      # If the operator supplied enscrive_docs_version, use it directly.
      # Otherwise query the enscrive-docs repo for its most recent v* release tag.
      # The resolved value is cached in a step output so every subsequent step
      # uses exactly the same tag — no repeated gh calls, no drift.
      # ---------------------------------------------------------------------------
      - name: Resolve enscrive-docs version
        id: resolve_docs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ENSCRIVE_DOCS_VERSION_INPUT: ${{ inputs.enscrive_docs_version }}
        run: |
          set -euo pipefail

          if [[ -n "${ENSCRIVE_DOCS_VERSION_INPUT}" ]]; then
            DOCS_VERSION="${ENSCRIVE_DOCS_VERSION_INPUT}"
            echo "enscrive-docs version pinned by operator: ${DOCS_VERSION}"
          else
            echo "enscrive-docs version not pinned — resolving latest tag from enscrive/enscrive-docs ..."
            DOCS_VERSION=$(gh release list \
              --repo enscrive/enscrive-docs \
              --limit 1 \
              --json tagName \
              --jq '.[0].tagName')
            if [[ -z "${DOCS_VERSION}" ]]; then
              echo "ERROR: could not resolve latest enscrive-docs release tag. Pass enscrive_docs_version explicitly."
              exit 1
            fi
            echo "Resolved enscrive-docs latest tag: ${DOCS_VERSION}"
          fi

          echo "docs_version=${DOCS_VERSION}" >> "${GITHUB_OUTPUT}"

      # ---------------------------------------------------------------------------
      # ENS-507: derive the four bash associative arrays from
      # _deploy/channels/roster.toml + _deploy/channels/${CHANNEL}.toml.
      #
      # Pattern A components ride the channel's `platform_version`.
      # Pattern B components use their `[overrides]` entry; the operator's
      # workflow-input override (already resolved in `resolve_docs`) wins over
      # the channel toml when present, preserving the prior precedence:
      #   operator input > channel-toml [overrides] > latest-tag fallback.
      # (For enscrive-docs specifically the latest-tag fallback is applied by
      # the resolve_docs step above, so by the time we reach here we already
      # have the final value to use when the channel toml is silent.)
      #
      # Output: /tmp/manifest-work/channel-config.sh — sourced by the three
      # downstream steps in place of their previously inline declarations.
      # ---------------------------------------------------------------------------
      - name: Build channel-config.sh from roster + channel toml
        id: build_channel_config
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          ENSCRIVE_DOCS_VERSION: ${{ steps.resolve_docs.outputs.docs_version }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/manifest-work

          # Write the generator to a file so it can be diffed in the runner log
          # and tested locally with `python3 _deploy/<...>` outside the workflow.
          # YAML's "run: |" block scalar dedents to the common indent prefix
          # before bash sees it, so the heredoc contents below arrive at
          # column 0 — no extra dedent needed.
          GEN=/tmp/manifest-work/gen_channel_config.py
          cat > "${GEN}" <<'PYEOF'
          import os
          import sys
          import tomllib
          from pathlib import Path

          channel = os.environ["CHANNEL"]
          docs_version_override = os.environ.get("ENSCRIVE_DOCS_VERSION", "").strip()

          deploy_dir = Path("_deploy/channels")
          roster_path = deploy_dir / "roster.toml"
          channel_path = deploy_dir / f"{channel}.toml"

          for p in (roster_path, channel_path):
              if not p.exists():
                  sys.stderr.write(f"ERROR: missing required file {p}\n")
                  sys.exit(1)

          with roster_path.open("rb") as f:
              roster = tomllib.load(f)
          with channel_path.open("rb") as f:
              channel_pins = tomllib.load(f)

          channel_platform_version = channel_pins.get("platform_version", "")
          overrides = channel_pins.get("overrides", {})

          components = roster.get("components", {})
          if not components:
              sys.stderr.write("ERROR: roster.toml has no [components.*] tables\n")
              sys.exit(1)

          # Per-component source-version resolution.
          # Pattern A (ENS-538): if the channel toml [overrides] table contains an
          #   entry for this component, use it. Otherwise fall back to the channel's
          #   platform_version (the herd baseline). This enables per-component
          #   pinning while preserving platform_version as the default.
          # Pattern B: operator workflow input wins; else channel toml [overrides];
          #            else error (we have no fallback at this layer — resolve_docs
          #            handles the latest-tag fallback before we run).
          source_versions = {}
          for key, comp in components.items():
              pattern = comp.get("pattern")
              if pattern == "A":
                  source_versions[key] = overrides.get(key, channel_platform_version)
              elif pattern == "B":
                  # enscrive-docs special case: operator override + latest-tag
                  # fallback are resolved in the `resolve_docs` step above.
                  # That value supersedes the channel toml [overrides] entry,
                  # matching the prior workflow precedence.
                  if key == "enscrive-docs" and docs_version_override:
                      source_versions[key] = docs_version_override
                  elif key in overrides:
                      source_versions[key] = overrides[key]
                  else:
                      sys.stderr.write(
                          f"ERROR: pattern-B component '{key}' has no override "
                          f"in channels/{channel}.toml and no workflow-input value\n"
                      )
                      sys.exit(1)
              else:
                  sys.stderr.write(
                      f"ERROR: component '{key}' has unknown pattern '{pattern}' "
                      f"(must be 'A' or 'B')\n"
                  )
                  sys.exit(1)

          # Emit channel-config.sh: four bash associative arrays whose contents
          # are byte-equivalent (modulo iteration order, which the downstream
          # consumers do not depend on) to the previously inline declarations.
          out_path = Path("/tmp/manifest-work/channel-config.sh")
          lines = [
              "# Auto-generated by .github/workflows/manifest.yml — DO NOT EDIT.",
              "# Source: enscrive-deploy/channels/roster.toml + channels/${CHANNEL}.toml.",
              "# ENS-507: replaces the four bash associative arrays previously",
              "# duplicated across three steps of this workflow.",
              "",
              "declare -A SOURCE_VERSIONS",
              "declare -A BINARIES",
              "declare -A ARTIFACT_KIND",
              "declare -A PLATFORMS",
              "",
          ]
          # Deterministic order matches roster.toml table order.
          for key, comp in components.items():
              binary = comp["binary"]
              kind = comp["kind"]
              platforms = " ".join(comp["platforms"])
              src_ver = source_versions[key]
              lines.append(f'SOURCE_VERSIONS["{key}"]="{src_ver}"')
              lines.append(f'BINARIES["{key}"]="{binary}"')
              lines.append(f'ARTIFACT_KIND["{key}"]="{kind}"')
              lines.append(f'PLATFORMS["{key}"]="{platforms}"')
              lines.append("")
          out_path.write_text("\n".join(lines))
          print(f"Wrote {out_path}:")
          print(out_path.read_text())
          PYEOF

          python3 "${GEN}"

      # ---------------------------------------------------------------------------
      # ENS-507 verification: assert the generated channel-config.sh produces
      # the expected bash-array values. Fails fast on drift so a roster/channel
      # toml schema change can never silently corrupt a published manifest.
      #
      # Note: SOURCE_VERSIONS values reflect the current channels/<channel>.toml
      # `platform_version` pin — they are NOT the workflow `version` input.
      # That divergence is the entire point of ENS-507: the channel toml is the
      # source of truth. If dev.toml says v00000000-0000, that is the value
      # that flows into the manifest. Operator-facing version control happens
      # via promotion-ceremony PRs against channels/<channel>.toml.
      # ---------------------------------------------------------------------------
      - name: Verify channel-config.sh shape
        shell: bash
        run: |
          set -euo pipefail
          source /tmp/manifest-work/channel-config.sh

          ALL_TARGETS="x86_64-unknown-linux-gnu"
          DEVELOPER_TARGETS="x86_64-unknown-linux-gnu"

          fail=0
          assert() {
            local label="$1" actual="$2" expected="$3"
            if [[ "${actual}" != "${expected}" ]]; then
              echo "FAIL ${label}: expected '${expected}' got '${actual}'"
              fail=$((fail+1))
            else
              echo "OK   ${label}: ${actual}"
            fi
          }

          # BINARIES
          assert 'BINARIES[enscrive-cli]'                "${BINARIES[enscrive-cli]:-}"                "enscrive"
          assert 'BINARIES[enscrive-developer]'          "${BINARIES[enscrive-developer]:-}"          "enscrive-developer"
          assert 'BINARIES[enscrive-observe]'            "${BINARIES[enscrive-observe]:-}"            "enscrive-observe"
          assert 'BINARIES[enscrive-embed]'              "${BINARIES[enscrive-embed]:-}"              "enscrive-embed"
          assert 'BINARIES[esm]'                         "${BINARIES[esm]:-}"                         "esm"
          assert 'BINARIES[enscrive-metering-sentinel]'  "${BINARIES[enscrive-metering-sentinel]:-}"  "enscrive-metering-sentinel"
          assert 'BINARIES[enscrive-docs]'               "${BINARIES[enscrive-docs]:-}"               "enscrive-docs"

          # ARTIFACT_KIND
          assert 'ARTIFACT_KIND[enscrive-cli]'                "${ARTIFACT_KIND[enscrive-cli]:-}"                "binary"
          assert 'ARTIFACT_KIND[enscrive-developer]'          "${ARTIFACT_KIND[enscrive-developer]:-}"          "archive"
          assert 'ARTIFACT_KIND[enscrive-observe]'            "${ARTIFACT_KIND[enscrive-observe]:-}"            "binary"
          assert 'ARTIFACT_KIND[enscrive-embed]'              "${ARTIFACT_KIND[enscrive-embed]:-}"              "binary"
          assert 'ARTIFACT_KIND[esm]'                         "${ARTIFACT_KIND[esm]:-}"                         "binary"
          assert 'ARTIFACT_KIND[enscrive-metering-sentinel]'  "${ARTIFACT_KIND[enscrive-metering-sentinel]:-}"  "binary"
          assert 'ARTIFACT_KIND[enscrive-docs]'               "${ARTIFACT_KIND[enscrive-docs]:-}"               "binary"

          # PLATFORMS
          assert 'PLATFORMS[enscrive-cli]'                "${PLATFORMS[enscrive-cli]:-}"                "${ALL_TARGETS}"
          assert 'PLATFORMS[enscrive-developer]'          "${PLATFORMS[enscrive-developer]:-}"          "${DEVELOPER_TARGETS}"
          assert 'PLATFORMS[enscrive-observe]'            "${PLATFORMS[enscrive-observe]:-}"            "${ALL_TARGETS}"
          assert 'PLATFORMS[enscrive-embed]'              "${PLATFORMS[enscrive-embed]:-}"              "${ALL_TARGETS}"
          assert 'PLATFORMS[esm]'                         "${PLATFORMS[esm]:-}"                         "${ALL_TARGETS}"
          assert 'PLATFORMS[enscrive-metering-sentinel]'  "${PLATFORMS[enscrive-metering-sentinel]:-}"  "${ALL_TARGETS}"
          assert 'PLATFORMS[enscrive-docs]'               "${PLATFORMS[enscrive-docs]:-}"               "${ALL_TARGETS}"

          # SOURCE_VERSIONS — Pattern A entries reflect the channel toml's
          # platform_version pin (NOT the workflow input). Pattern B uses
          # the resolved docs version (operator input > channel override).
          # Both are non-empty for any valid roster/channel toml pair.
          for key in enscrive-cli enscrive-developer enscrive-observe enscrive-embed esm enscrive-metering-sentinel enscrive-docs; do
            val="${SOURCE_VERSIONS[$key]:-}"
            if [[ -z "${val}" ]]; then
              echo "FAIL SOURCE_VERSIONS[${key}] is empty"
              fail=$((fail+1))
            else
              echo "OK   SOURCE_VERSIONS[${key}]: ${val}"
            fi
          done

          if [[ ${fail} -gt 0 ]]; then
            echo "ERROR: ${fail} channel-config.sh assertion(s) failed."
            exit 1
          fi
          echo "channel-config.sh verification passed."

      # ---------------------------------------------------------------------------
      # Gate: verify all expected artifacts exist in S3 before generating a manifest.
      # Fail fast if any binary is missing — partial manifests must not be published.
      #
      # SOURCE_VERSIONS maps each repo to the S3 version path it was published under.
      # Pattern A binaries use $VERSION (the unified platform tag).
      # Pattern B binaries (enscrive-docs) use their own independently resolved tag.
      # ---------------------------------------------------------------------------
      - name: Verify all artifacts exist in S3
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          ENSCRIVE_DOCS_VERSION: ${{ steps.resolve_docs.outputs.docs_version }}
        run: |
          set -euo pipefail

          # ENS-507: source-of-truth declarations generated from
          # enscrive-deploy/channels/roster.toml + channels/${CHANNEL}.toml.
          # See the "Build channel-config.sh ..." step above.
          source /tmp/manifest-work/channel-config.sh

          MISSING=0
          for REPO in "${!BINARIES[@]}"; do
            BINARY="${BINARIES[$REPO]}"
            KIND="${ARTIFACT_KIND[$REPO]}"
            SRC_VER="${SOURCE_VERSIONS[$REPO]}"
            for TARGET in ${PLATFORMS[$REPO]}; do
              if [[ "${KIND}" = "archive" ]]; then
                KEY="releases/${CHANNEL}/${SRC_VER}/${TARGET}/${BINARY}.tar.gz"
              else
                KEY="releases/${CHANNEL}/${SRC_VER}/${TARGET}/${BINARY}"
              fi
              echo "Checking s3://${S3_BUCKET}/${KEY} ..."
              if ! aws s3api head-object \
                    --bucket "${S3_BUCKET}" \
                    --key "${KEY}" \
                    --output json > /dev/null 2>&1; then
                echo "MISSING: s3://${S3_BUCKET}/${KEY}"
                MISSING=$((MISSING + 1))
              fi
            done
          done

          if [[ $MISSING -gt 0 ]]; then
            echo "ERROR: ${MISSING} artifact(s) missing from S3. Cannot generate manifest."
            exit 1
          fi

          echo "All artifacts verified present in S3."

      # ---------------------------------------------------------------------------
      # Collect SHA256 and size for every artifact.
      # sha256 files contain "<hash>  <filename>" — we strip the filename.
      # size_bytes comes from head-object ContentLength.
      # ---------------------------------------------------------------------------
      - name: Collect SHA256 and size metadata
        id: metadata
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          ENSCRIVE_DOCS_VERSION: ${{ steps.resolve_docs.outputs.docs_version }}
        run: |
          set -euo pipefail

          mkdir -p /tmp/manifest-work

          # ENS-507: source-of-truth declarations generated from
          # enscrive-deploy/channels/roster.toml + channels/${CHANNEL}.toml.
          source /tmp/manifest-work/channel-config.sh

          # Emit one line per artifact:
          #   REPO TARGET BINARY KIND S3_KEY_SUFFIX SHA256 SIZE_BYTES SOURCE_VERSION
          METADATA_FILE="/tmp/manifest-work/metadata.tsv"
          : > "${METADATA_FILE}"

          for REPO in "${!BINARIES[@]}"; do
            BINARY="${BINARIES[$REPO]}"
            KIND="${ARTIFACT_KIND[$REPO]}"
            SRC_VER="${SOURCE_VERSIONS[$REPO]}"
            if [[ "${KIND}" = "archive" ]]; then
              SUFFIX="${BINARY}.tar.gz"
            else
              SUFFIX="${BINARY}"
            fi
            for TARGET in ${PLATFORMS[$REPO]}; do
              KEY="releases/${CHANNEL}/${SRC_VER}/${TARGET}/${SUFFIX}"

              # Compute SHA256 by streaming the artifact itself. Robust
              # against per-binary `.sha256` sidecars not being produced
              # uniformly across upstream workflows.
              echo "Hashing s3://${S3_BUCKET}/${KEY} ..."
              RAW_HASH=$(aws s3 cp "s3://${S3_BUCKET}/${KEY}" - 2>/dev/null | sha256sum | awk '{print $1}')
              if [[ -z "${RAW_HASH}" || "${RAW_HASH}" = "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]]; then
                echo "ERROR: empty SHA256 for ${KEY}; aws s3 cp likely failed"
                exit 1
              fi

              SIZE_BYTES=$(aws s3api head-object \
                --bucket "${S3_BUCKET}" \
                --key "${KEY}" \
                --query 'ContentLength' \
                --output text)

              echo -e "${REPO}\t${TARGET}\t${BINARY}\t${KIND}\t${SUFFIX}\t${RAW_HASH}\t${SIZE_BYTES}\t${SRC_VER}" >> "${METADATA_FILE}"
            done
          done

          echo "Metadata collection complete."
          cat "${METADATA_FILE}"

      # ---------------------------------------------------------------------------
      # Generate manifest.json from collected metadata.
      # Schema per DESIGN.md §2.3 — channel-first URL convention per §2.2.
      # ---------------------------------------------------------------------------
      - name: Generate manifest.json
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          METADATA_FILE="/tmp/manifest-work/metadata.tsv"
          MANIFEST_FILE="/tmp/manifest-work/manifest.json"
          GENERATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Public install hostname. Both install.enscrive.io and
          # dev.enscrive.io alias the same CloudFront distribution today,
          # but install.* is the documented public surface (curl
          # install.enscrive.io | sh) and what we want hardcoded into
          # manifests so released CLIs hit the public path forever.
          BASE_URL="https://install.enscrive.io"

          # Derive channel label for the manifest's "channel" field.
          # Tags like v0.1.0-beta.x map to "beta"; others to "internal" for now.
          if [[ "${VERSION}" == *-beta* ]]; then
            CHANNEL_LABEL="beta"
          elif [[ "${VERSION}" == *-alpha* ]]; then
            CHANNEL_LABEL="internal"
          elif [[ "${VERSION}" == *-rc* ]]; then
            CHANNEL_LABEL="beta"
          else
            CHANNEL_LABEL="stable"
          fi

          # ENS-507: source-of-truth declarations generated from
          # enscrive-deploy/channels/roster.toml + channels/${CHANNEL}.toml.
          # Only BINARIES + ARTIFACT_KIND are read here; PLATFORMS and
          # SOURCE_VERSIONS are unused at this step (already encoded into the
          # metadata.tsv emitted by the previous step).
          source /tmp/manifest-work/channel-config.sh

          # Build per-binary platform objects via jq.
          # Start with an empty binaries object and accumulate.
          BINARIES_JSON="{}"

          for REPO in "${!BINARIES[@]}"; do
            BINARY="${BINARIES[$REPO]}"
            KIND="${ARTIFACT_KIND[$REPO]}"

            # Extract rows for this binary from the TSV.
            # Column layout: REPO TARGET BINARY KIND SUFFIX SHA256 SIZE SOURCE_VERSION
            PLATFORMS_JSON="{}"
            SOURCE_VER=""
            while IFS=$'\t' read -r ROW_REPO ROW_TARGET ROW_BINARY ROW_KIND ROW_SUFFIX ROW_SHA256 ROW_SIZE ROW_SRC_VER; do
              [[ "${ROW_REPO}" != "${REPO}" ]] && continue
              SOURCE_VER="${ROW_SRC_VER}"

              ARTIFACT_URL="${BASE_URL}/releases/${CHANNEL}/${ROW_SRC_VER}/${ROW_TARGET}/${ROW_SUFFIX}"

              PLATFORM_ENTRY=$(jq -n \
                --arg url "${ARTIFACT_URL}" \
                --arg sha256 "${ROW_SHA256}" \
                --argjson size "${ROW_SIZE}" \
                '{"url": $url, "sha256": $sha256, "size_bytes": $size}')

              PLATFORMS_JSON=$(echo "${PLATFORMS_JSON}" | jq \
                --arg target "${ROW_TARGET}" \
                --argjson entry "${PLATFORM_ENTRY}" \
                '. + {($target): $entry}')
            done < "${METADATA_FILE}"

            # Per-binary entry carries `kind` and `source_version`.
            # `source_version` distinguishes Pattern A (matches unified version)
            # from Pattern B (pinned independently, e.g. enscrive-docs).
            # Consumers branch on `kind` to decide whether to treat the artifact
            # as a plain executable or extract a tar.gz containing binary + site/.
            BINARY_ENTRY=$(jq -n \
              --arg source_version "${SOURCE_VER}" \
              --arg kind "${KIND}" \
              --argjson platforms "${PLATFORMS_JSON}" \
              '{"source_version": $source_version, "kind": $kind, "platforms": $platforms}')

            BINARIES_JSON=$(echo "${BINARIES_JSON}" | jq \
              --arg binary "${BINARY}" \
              --argjson entry "${BINARY_ENTRY}" \
              '. + {($binary): $entry}')
          done

          # Assemble final manifest. schema_version=3: extends schema_version=2
          # (per-binary `kind`) with populated `source_version` per binary,
          # enabling mixed distribution patterns in the same manifest.
          # Consumers that only understand schema_version <= 2 should reject
          # schema_version=3 rather than silently ignore source_version.
          jq -n \
            --argjson schema_version 3 \
            --arg version "${VERSION}" \
            --arg released_at "${GENERATED_AT}" \
            --arg channel "${CHANNEL_LABEL}" \
            --argjson binaries "${BINARIES_JSON}" \
            --arg min_cli_version "${VERSION}" \
            '{
              "schema_version": $schema_version,
              "version": $version,
              "released_at": $released_at,
              "channel": $channel,
              "binaries": $binaries,
              "compatibility": {
                "min_cli_version": $min_cli_version
              },
              "signature": null
            }' > "${MANIFEST_FILE}"

          echo "Generated manifest.json:"
          cat "${MANIFEST_FILE}"

      # ---------------------------------------------------------------------------
      # Publish: upload to both versioned and current-pointer S3 paths, then
      # invalidate CloudFront so both URLs reflect the new manifest immediately.
      # ---------------------------------------------------------------------------
      - name: Upload manifest.json to S3 (versioned + current pointer)
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          MANIFEST_FILE="/tmp/manifest-work/manifest.json"

          # Versioned copy — immutable, keep forever
          aws s3 cp \
            "${MANIFEST_FILE}" \
            "s3://${S3_BUCKET}/releases/${CHANNEL}/${VERSION}/manifest.json" \
            --content-type "application/json" \
            --cache-control "public, max-age=31536000, immutable"

          # Current pointer — short TTL so consumers pick up new releases promptly
          aws s3 cp \
            "${MANIFEST_FILE}" \
            "s3://${S3_BUCKET}/releases/${CHANNEL}/latest.json" \
            --content-type "application/json" \
            --cache-control "public, max-age=300"

          echo "Manifest uploaded to:"
          echo "  s3://${S3_BUCKET}/releases/${CHANNEL}/${VERSION}/manifest.json"
          echo "  s3://${S3_BUCKET}/releases/${CHANNEL}/latest.json"

      - name: Invalidate CloudFront cache (fire and forget)
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          # Note: the OIDC role `enscrive-releases-publisher` has
          # `cloudfront:CreateInvalidation` but not
          # `cloudfront:GetInvalidation` — so we cannot `wait` here. The
          # invalidation is submitted and typically completes within
          # 60–120s. Consumers reading via CloudFront should retry once
          # if a fresh manifest hasn't propagated. Tracked: founder-IAM
          # task to add GetInvalidation if a synchronous publish gate
          # becomes worth it.
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${CF_DISTRIBUTION_ID}" \
            --paths \
              "/releases/${CHANNEL}/latest.json" \
              "/releases/${CHANNEL}/${VERSION}/manifest.json" \
            --query 'Invalidation.Id' \
            --output text)

          echo "CloudFront invalidation submitted: ${INVALIDATION_ID}"
          echo "(Workflow does not wait — see code comment for IAM context.)"

      - name: manifest published
        run: echo "manifest published"
